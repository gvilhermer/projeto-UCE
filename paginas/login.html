<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Kleber Kawasaki</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login">

    <div class="login-container">

        <div class="foto">
            <img src="/img/Kleber/Kleber_studio.jpg"
                 class="img-login"
                 alt="Foto">
        </div>

        <div class="dados">

            <h1>Bem-vindo(a)!</h1>

            <label for="usuario">Usuário</label>
            <input type="text"
                   id="usuario"
                   name="usuario"
                   placeholder="email@exemplo.com">

            <label for="senha">Senha</label>
            <input type="password"
                   id="senha"
                   name="senha"
                   placeholder="Digite sua senha">

            <p class="esqueci">Esqueci Minha Senha</p>

        <button type="submit" onclick="entrar()">Entrar</button> 
           

    <div class="bottom">

    <div class="google-login">
        <img src="/img/icon/google.png" class="google" alt="">
        <span>Google</span>
    </div>

    <p class="criar">
        Não tem uma Conta? <a href=""><strong>Crie uma!</strong></a>
    </p>

</div>
        </div>

    </div>

</div>

<script src="/js/login.js"></script>

</body>
</html>
