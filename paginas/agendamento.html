        <nav>
            <ul class="cabecalho_menu">
                <li class="cabecalho_item-menu"><a href="/Pagina_Inicial.html">Inicio</a></li>
                <li class="cabecalho_item-menu"><a href="/paginas/agendamento.html">Agenda</a></li>
                <li class="cabecalho_item-menu"><a href="/cursos/cursos.html">Cursos</a></li>
                <div class="dropdown">
                  <button class="dropbtn"><li class="cabecalho_item-menu"><a href="/paginas/portifolio.html">Portfólio</a></li></button>
                  <div class="dropdown-content">
                    <a href="/paginas/agendamento.html">Pré Wedding</a>

                  </div>

                <li class="cabecalho_item-menu cabecalho_item-menu-contato"><a href="https://api.whatsapp.com/send?phone=5519993058960&text=Ol%C3%A1,%20estava%20visitando%20seu%20site%20e%20me%20interessei%20pelo%20seu%20trabalho.">Contato</a></li>
            </ul>
        </nav>
    </header>

 
    <main>
       

        <section class="booking-card">
           
            <div class="date-selector">
                <div class="date-item">Seg<span>13</span></div>
                <div class="date-item">Ter<span>14</span></div>
                <div class="date-item">Qua<span>15</span></div>
                <div class="date-item">Qui<span>16</span></div>
                <div class="date-item">Sex<span>17</span></div>
                <div class="date-item">Sab<span>18</span></div>
                <div class="date-item">Dom<span>19</span></div>
            </div>

            <div class="time-slots">
              
                <div class="period-section">
                    <div class="period-header"><span>Manhã</span><hr></div>
                    <div class="grid-times">
                        <button class="time-btn">07:00</button>
                        <button class="time-btn active">08:00</button>
                        <button class="time-btn">09:00</button>
                        <button class="time-btn">10:00</button>
                        <button class="time-btn">11:00</button>
                        <button class="time-btn">12:00</button>
                    </div>
                </div>

          
                <div class="period-section">
                    <div class="period-header"><span>Tarde</span><hr></div>
                    <div class="grid-times">
                        <button class="time-btn">13:00</button>
                        <button class="time-btn">15:00</button>
                        <button class="time-btn">17:00</button>
                        <button class="time-btn">14:00</button>
                        <button class="time-btn">16:00</button>
                        <button class="time-btn">18:00</button>
                    </div>
                </div>
            </div>

            <button class="confirm-btn">Confirmar</button>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-address">
                <strong>Endereço:</strong><br>

                São João da Boa Vista / SP</p>
            </div>

                <a href="https://www.facebook.com/kleberkawasaki?mibextid=ZbWKwL"><img src="/img/icon/facebook_logo.png" alt="Facebook"></a>

        </div>
